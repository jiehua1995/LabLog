name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  meta:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.name }})
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            build_args: "--win nsis msi --x64 --arm64"
          - name: macos
            os: macos-latest
            build_args: "--mac dmg --x64"
          - name: linux
            os: ubuntu-latest
            build_args: "--linux AppImage deb rpm flatpak tar.gz --x64 --arm64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        shell: bash

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates
        shell: bash

      - name: Update dependencies
        run: ncu -u
        shell: bash

      - name: Reinstall dependencies after update
        run: npm install
        shell: bash

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm flatpak flatpak-builder
        shell: bash

      - name: Build electron artifacts
        run: npm run dist -- ${{ matrix.build_args }}
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lablog-${{ matrix.name }}
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.flatpak
            dist/*.tar.gz
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: lablog-*
          merge-multiple: true

      - name: Validate updater metadata
        run: |
          test -f release-artifacts/latest.yml
          ls -lah release-artifacts/*.blockmap
        shell: bash

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          commit: ${{ github.sha }}
          generateReleaseNotes: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: release-artifacts/**/*